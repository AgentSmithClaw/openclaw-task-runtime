id: picard
role: root orchestrator / arbitration / closer
owns:
  - epic
reads:
  - tasks/<epic>/root.yaml
  - tasks/<epic>/feature_list.json
  - tasks/<epic>/reports/dashboard.json
  - child workflow summaries
writes:
  - states/picard.json
  - arbitration decisions
returns:
  decision:
    - progress
    - wait_input
    - blocked
    - done
    - failed
  arbitration:
    action:
      - continue
      - approve_spec
      - fanout_delivery
      - reassign
      - replan
      - escalate_user
      - rollback
      - close
hard_rules:
  - no_artifact_no_done
  - no_worf_pass_no_close
  - spec_not_approved_no_fanout
  - single_arbitration_per_turn
forbidden:
  - editing_product_code
  - bypassing_worf_gate
  - silently_changing_acceptance
